name: publish-maven

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout Vesper
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build and publish to local staging repo
        run: ./gradlew publish

      - name: Checkout codexbat-maven
        uses: actions/checkout@v6
        with:
          repository: codex-bat/codexbat-maven
          ref: main
          path: codexbat-maven
          token: ${{ secrets.MAVEN_DEPLOY_TOKEN }}

      - name: Sync release repository
        run: |
          mkdir -p codexbat-maven/releases
          rsync -a --delete build/staging-repo/releases/ codexbat-maven/releases/
          printf 'maven.codexbat.dev\n' > codexbat-maven/CNAME

      - name: Commit and push
        working-directory: codexbat-maven
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish ${GITHUB_REF_NAME}" || exit 0
          git push origin main